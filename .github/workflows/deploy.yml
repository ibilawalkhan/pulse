name: Deploy

# Deploys to AWS on every push to main. Auth is via GitHub OIDC assuming a
# scoped IAM role — no long-lived AWS keys are stored in GitHub.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write # required for OIDC
  contents: read

env:
  AWS_REGION: ap-southeast-2
  TF_VAR_image_tag: ${{ github.sha }}
  # Non-secret Terraform inputs come from repo variables.
  TF_VAR_domain_name: ${{ vars.DOMAIN_NAME }}
  TF_VAR_hosted_zone_id: ${{ vars.HOSTED_ZONE_ID }}
  TF_VAR_ses_from_address: ${{ vars.SES_FROM_ADDRESS }}
  TF_VAR_alarm_email: ${{ vars.ALARM_EMAIL }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images (tag = git SHA)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          for svc in api scheduler worker; do
            IMAGE="$REGISTRY/pulse-prod-$svc:${{ github.sha }}"
            docker build -f "apps/$svc/Dockerfile" -t "$IMAGE" .
            docker push "$IMAGE"
          done

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve -input=false

      # Run Prisma migrations as a one-off ECS task using the freshly-registered
      # api task definition (which references the new image). Migrations are
      # forward-only and expand-compatible, so this is safe alongside the rollout.
      - name: Run database migrations
        working-directory: infra
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          TASKDEF=$(terraform output -raw api_task_definition_family)
          SUBNETS=$(terraform output -json public_subnet_ids | jq -r 'join(",")')
          SG=$(terraform output -raw service_security_group_id)
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASKDEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["npx","prisma","migrate","deploy","--schema","packages/db/prisma/schema.prisma"]}]}' \
            --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"
          EXIT=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" --query 'tasks[0].containers[0].exitCode' --output text)
          echo "migration exit code: $EXIT"
          test "$EXIT" = "0"

      - name: Smoke test
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ vars.DOMAIN_NAME }}/health" || true)
            echo "attempt $i: HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 15
          done
          echo "smoke test failed: /health never returned 200"
          exit 1
